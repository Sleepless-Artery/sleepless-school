apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: kafka-brokers
  namespace: online-learning-platform
  labels:
    strimzi.io/cluster: kafka
spec:
  replicas: 1
  roles:
    - broker
    - controller
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi
  storage:
    type: persistent-claim
    size: 10Gi