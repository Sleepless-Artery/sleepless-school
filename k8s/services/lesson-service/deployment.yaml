apiVersion: apps/v1
kind: Deployment
metadata:
  name: lesson-service
  namespace: online-learning-platform
  labels:
    app: lesson-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lesson-service
  template:
    metadata:
      labels:
        app: lesson-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until nc -z postgres-lessons 5432; do
                sleep 2
              done
              echo "Postgres is available"
      containers:
        - name: lesson-service
          image: arterygin/lesson-service:1.0.5
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8084

          envFrom:
            - configMapRef:
                name: lesson-config
            - secretRef:
                name: lesson-secret

          readinessProbe:
            httpGet:
              path: /internal/actuator/health
              port: 8084
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /internal/actuator/health
              port: 8084
            initialDelaySeconds: 240
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

      restartPolicy: Always
