apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: online-learning-platform
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: arterygin/notification-service:1.0.11
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8086

          envFrom:
            - configMapRef:
                name: notification-config
            - secretRef:
                name: notification-secret

          readinessProbe:
            httpGet:
              path: /internal/actuator/health
              port: 8086
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /internal/actuator/health
              port: 8086
            initialDelaySeconds: 240
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

      restartPolicy: Always
