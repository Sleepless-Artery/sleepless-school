apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrollment-service
  namespace: online-learning-platform
  labels:
    app: enrollment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enrollment-service
  template:
    metadata:
      labels:
        app: enrollment-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until nc -z postgres-enrollments 5432; do
                sleep 2
              done
              echo "Postgres is available"
      containers:
        - name: enrollment-service
          image: arterygin/enrollment-service:1.0.4
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8085

          envFrom:
            - configMapRef:
                name: enrollment-config
            - secretRef:
                name: enrollment-secret

          readinessProbe:
            httpGet:
              path: /internal/actuator/health
              port: 8085
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /internal/actuator/health
              port: 8085
            initialDelaySeconds: 240
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

      restartPolicy: Always
