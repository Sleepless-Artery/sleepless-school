apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: online-learning-platform
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until nc -z postgres-users 5432; do
                sleep 2
              done
              echo "Postgres is available"
      containers:
        - name: user-service
          image: arterygin/user-service:1.0.11
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8082

          envFrom:
            - configMapRef:
                name: user-config
            - secretRef:
                name: user-secret

          readinessProbe:
            httpGet:
              path: /internal/actuator/health
              port: 8082
            initialDelaySeconds: 180
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /internal/actuator/health
              port: 8082
            initialDelaySeconds: 240
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

      restartPolicy: Always
