apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-discovery-binding
  namespace: online-learning-platform
subjects:
  - kind: ServiceAccount
    name: gateway-sa
    namespace: online-learning-platform
roleRef:
  kind: Role
  name: gateway-discovery-role
  apiGroup: rbac.authorization.k8s.io