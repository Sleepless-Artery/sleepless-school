apiVersion: apps/v1
kind: Deployment
metadata:
  name: submission-service
  namespace: online-learning-platform
  labels:
    app: submission-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: submission-service
  template:
    metadata:
      labels:
        app: submission-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for postgres..."
              until nc -z postgres-submissions 5432; do
                sleep 2
              done
              echo "Postgres is available"
      containers:
        - name: submission-service
          image: arterygin/submission-service:1.0.3
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8088

          envFrom:
            - configMapRef:
                name: submission-config
            - secretRef:
                name: submission-secret

          readinessProbe:
            httpGet:
              path: /internal/actuator/health/readiness
              port: 8088
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /internal/actuator/health/liveness
              port: 8088
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"

          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false

      restartPolicy: Always
