server:
  port: 8085

spring:
  application:
    name: enrollment-service
  datasource:
    url: ${ENROLLMENT_DB_URL}
    username: ${ENROLLMENT_DB_USERNAME}
    password: ${ENROLLMENT_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      initialization-fail-timeout: 60000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    encoding: UTF-8
    validate-on-migrate: true
    baseline-on-migrate: true
    connection-retries: 10
    init-sqls: "SELECT 1"

  kafka:
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JacksonJsonSerializer
      retries: 5
      acks: all
      batch-size: 65536
      delivery-timeout-ms: 30000
      linger-ms: 1000
      request-timeout-ms: 10000
      retry-backoff-ms: 1000
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
      group-id: enrollment-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      concurrency: 1
      trusted-packages: org.sleepless_artery.enrollment_service.*

  cache:
    type: redis
  data:
    redis:
      host: ${ENROLLMENT_REDIS_HOST:}
      port: ${ENROLLMENT_REDIS_PORT:6379}
      password: ${ENROLLMENT_REDIS_PASSWORD:}

grpc:
  client:
    GLOBAL:
      negotiation-type: plaintext
      keep-alive-time: 30s
      keep-alive-timeout: 20s
    user-service:
      address: ${USER_SERVICE_GRPC_URL:static://user-service:9093}
    course-service:
      address: ${COURSE_SERVICE_GRPC_URL:static://course-service:9095}

resilience4j:
  circuitbreaker:
    instances:
      user-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: false
      course-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        register-health-indicator: false

  retry:
    instances:
      user-service:
        max-attempts: 1
        wait-duration: 300ms
        retry-exceptions:
          - io.grpc.StatusRuntimeException
          - org.sleepless_artery.enrollment_service.exception.ExternalServiceUnavailableException
      course-service:
        max-attempts: 1
        wait-duration: 300ms
        retry-exceptions:
          - io.grpc.StatusRuntimeException
          - org.sleepless_artery.enrollment_service.exception.ExternalServiceUnavailableException


management:
  endpoints:
    web:
      exposure:
        include: health
      base-path: /internal/actuator
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: db, diskSpace
        liveness:
          include: ping

logging:
  level:
    org:
      springframework: WARN
      hibernate:
        SQL: WARN
        type.descriptor.sql.BasicBinder: WARN
      sleepless_artery:
        enrollment_service: WARN

springdoc:
  api-docs:
    path: /internal/openapi
  swagger-ui:
    path: /internal/swagger
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
  show-actuator: false
  packages-to-scan: org.sleepless_artery.enrollment_service.controller